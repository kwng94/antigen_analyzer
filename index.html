            "셀러리": { proteins: [{ name: "Api g 1", family: "PR-10", risk: "high", heatSafe: true, desc: "자작나무-쑥-셀러리 증후군을 일으키는 PR-10 단백질입니다.", relatedFoods: ["당근", "사과"] }] },
            "당근": { proteins: [{ name: "Dau c 1", family: "PR-10", risk: "medium", heatSafe: true, desc: "당근에 포함된 PR-10 단백질로 가열 시 알레르기성이 파괴됩니다.", relatedFoods: ["셀러리", "사과"] }] },
            "키위": { proteins: [{ name: "Act d 8", family: "PR-10", risk: "medium", heatSafe: true, desc: "키위에 포함된 PR-10 계열 항원입니다.", relatedFoods: ["사과", "셀러리"] }] },
            "밤": { proteins: [{ name: "Cas s 1", family: "PR-10", risk: "medium", heatSafe: true, desc: "밤에 포함된 PR-10 항원으로 자작나무 꽃가루와 교차반응합니다.", relatedFoods: ["사과", "헤이즐넛"] }] },
            "마카다미아": { proteins: [{ name: "Mac i 1", family: "Globulin", risk: "medium", heatSafe: false, desc: "별개의 알레르기 반응을 일으키는 경우가 많으며 열에 강함.", relatedFoods: ["호두"] }] },
            "잭프루트": { proteins: [{ name: "Art h 1", family: "PR-4", risk: "low", heatSafe: true, desc: "라텍스(고무) 등과 교차 반응.", relatedFoods: ["사과", "키위", "바나나"] }] },
            "우유": { proteins: [{ name: "Bos d 5", family: "Lipocalin", risk: "high", heatSafe: false, desc: "베타-락토글로불린, 열에 강함", relatedFoods: ["산양유", "소고기"] }, { name: "카제인", family: "Casein", risk: "high", heatSafe: false, desc: "우유 단백질 80%", relatedFoods: ["산양유", "소고기"] }] },
            "달걀": { proteins: [{ name: "Gal d 1", family: "Kazal", risk: "high", heatSafe: false, desc: "오보뮤코이드, 열/효소에 강함", relatedFoods: ["메추리알"] }] }
        };

        const searchInput = document.getElementById("searchInput");

        async function searchFood(forceKeyword = null) {
            const keyword = forceKeyword || searchInput.value.trim();
            const resultContainer = document.getElementById("result-container");
            const proteinList = document.getElementById("proteinList");
            const foodNameTitle = document.getElementById("foodName");
            document.getElementById("search-autocomplete").style.display = "none";
            
            if(!keyword) { alert("음식 이름을 입력해주세요!"); return; }
            resultContainer.style.display = "block";
            foodNameTitle.innerText = `[${keyword}] 분석 결과`;

            if(foodDatabase[keyword]) {
                searchInput.value = keyword; 
                proteinList.innerHTML = ""; 
                
                foodDatabase[keyword].proteins.forEach(protein => {
                    let riskClass = protein.risk === "high" ? "risk-high" : (protein.risk === "medium" ? "risk-medium" : "risk-low");
                    let heatBadge = protein.heatSafe ? `<span class="tag heat-safe">🔥 가열 시 안전</span>` : `<span class="tag heat-danger">🔥 가열해도 위험</span>`;
                    let relatedTags = protein.relatedFoods.length > 0 ? protein.relatedFoods.map(food => `<span class="related-food" onclick="searchFood('${food}')">${food}</span>`).join("") : `<span style="color:#bbb; font-size:0.85rem;">정보 없음</span>`;
                    
                    proteinList.innerHTML += `
                        <div class="protein-item">
                            <div style="display: flex; align-items: center; flex-wrap: wrap;">
                                <div class="protein-tag-wrapper">
                                    <span class="tag ${riskClass}" onclick="openProteinModal('${protein.name}')">${protein.name}</span>
                                    <div class="tooltip"><strong>${protein.name} 특징:</strong><br>${protein.desc}</div>
                                </div>
                                ${heatBadge}
                            </div>
                            <div class="related-match">
                                <span class="related-arrow">→ 유사 식품:</span>${relatedTags}
                            </div>
                        </div>`;
                });
            } else {
                proteinList.innerHTML = `<p style="color:#666;">내부 정밀 DB에 없는 음식입니다. 외부 개방형 DB를 검색합니다... ⏳</p>`;
                try {
                    const response = await fetch(`https://ko.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(keyword)}`);
                    if(response.ok) {
                        const data = await response.json();
                        proteinList.innerHTML = `<div class="external-api-box"><h4>🌐 외부 DB (위키백과) 실시간 연동 결과</h4><p><strong>${data.title}</strong></p><p style="font-size: 0.95rem; line-height: 1.6; color: #444;">${data.extract || "상세 설명이 존재하지 않습니다."}</p><p style="font-size: 0.85rem; color: #888; margin-top: 15px;">* 현재 해당 식재료의 면역학적 단백질 구조는 Antigen Analyzer 내부 DB에 등재 대기 중입니다.</p></div>`;
                    } else { proteinList.innerHTML = `<p style="color:#d84315;">외부 DB에서도 '${keyword}'에 대한 정보를 찾을 수 없습니다.</p>`; }
                } catch (error) { proteinList.innerHTML = `<p style="color:#d84315;">외부 DB 네트워크 통신에 실패했습니다.</p>`; }
            }
        }
        searchInput.addEventListener("keypress", e => { if(e.key === "Enter"){ e.preventDefault(); searchFood(); }});

        // --- 🔥 핵심: 단백질 패밀리(Family) 기반 역추적 로직 ---
        function openProteinModal(proteinName) {
            const modal = document.getElementById("proteinModal");
            const titleEl = document.getElementById("modalTitle");
            const descEl = document.getElementById("modalDesc");
            const listEl = document.getElementById("modalFoodsList");
            
            // 1. 해당 단백질이 속한 패밀리(Family) 찾기
            let targetFamily = null;
            for (let food in foodDatabase) {
                let found = foodDatabase[food].proteins.find(p => p.name === proteinName);
                if (found && found.family) {
                    targetFamily = found.family;
                    break;
                }
            }

            let foodsContainingFamily = [];
            let proteinsInFamily = new Set();
            
            // 2. 해당 패밀리(또는 단백질)를 공유하는 모든 음식과 항원 수집
            for (let food in foodDatabase) {
                let hasMatch = false;
                foodDatabase[food].proteins.forEach(p => {
                    if (targetFamily && p.family === targetFamily) {
                        hasMatch = true;
                        proteinsInFamily.add(p.name);
                    } else if (!targetFamily && p.name === proteinName) {
                        // 패밀리 정보가 없는 단백질은 이름으로만 검색
                        hasMatch = true;
                        proteinsInFamily.add(p.name);
                    }
                });
                if (hasMatch) {
                    foodsContainingFamily.push(food);
                }
            }

            // 3. 모달창 UI 업데이트 (패밀리 단위 시각화)
            if (targetFamily) {
                titleEl.innerHTML = `🧬 ${targetFamily} 계열 단백질 그룹`;
                let pList = Array.from(proteinsInFamily).join(', ');
                descEl.innerHTML = `<strong>이 패밀리에 속하는 항원들:</strong> <span style="color:#d84315; font-weight:bold;">${pList}</span><br><br>위 항원들은 구조가 매우 비슷하여 우리 몸의 면역계가 헷갈려 <strong>교차 알레르기 반응</strong>을 일으킵니다. 아래는 이 그룹의 항원 중 하나라도 가지고 있는 <strong>모든 식재료</strong>입니다.`;
            } else {
                titleEl.innerHTML = `🔬 ${proteinName}`;
                descEl.innerHTML = `아래 음식들은 우리 데이터베이스 내에서 이 단백질(항원)을 공통으로 포함하고 있는 식재료들입니다.`;
            }
            
            listEl.innerHTML = "";
            if (foodsContainingFamily.length > 0) {
                [...new Set(foodsContainingFamily)].forEach(food => {
                    listEl.innerHTML += `<button class="modal-food-btn" onclick="closeModal(); searchFood('${food}'); document.getElementById('searchInput').scrollIntoView({behavior: 'smooth'});">${food}</button>`;
                });
            } else {
                listEl.innerHTML = "<p style='color:#888;'>데이터베이스 내에 연관 음식이 없습니다.</p>";
            }

            modal.style.display = "block";
        }

        function closeModal() { document.getElementById("proteinModal").style.display = "none"; }
        window.onclick = function(event) { const modal = document.getElementById("proteinModal"); if (event.target == modal) { modal.style.display = "none"; } }

        // --- 맞춤형 예측 로직 (기존 유지) ---
        let myAllergies = []; 
        const multiInput = document.getElementById("multiInput");
        const container = document.getElementById("myAllergiesContainer");

        function addMyAllergy(forceKeyword = null) {
            const keyword = forceKeyword || multiInput.value.trim();
            document.getElementById("multi-autocomplete").style.display = "none";
            if(!keyword) return;
            if(!foodDatabase[keyword]) { alert(`'${keyword}' 데이터가 내부 DB에 없습니다.`); return; }
            if(myAllergies.includes(keyword)) { alert("이미 추가된 음식입니다."); return; }
            myAllergies.push(keyword); multiInput.value = ""; renderMyAllergies();
            document.getElementById("predictionResult").style.display = "none";
        }
        multiInput.addEventListener("keypress", e => { if(e.key === "Enter"){ e.preventDefault(); addMyAllergy(); }});

        function renderMyAllergies() {
            if(myAllergies.length === 0) { container.innerHTML = '<span class="empty-text">음식을 추가하면 여기에 표시됩니다.</span>'; return; }
            container.innerHTML = "";
            myAllergies.forEach((food, index) => { container.innerHTML += `<div class="my-allergy-tag">${food} <span onclick="removeAllergy(${index})">✕</span></div>`; });
        }
        function removeAllergy(index) { myAllergies.splice(index, 1); renderMyAllergies(); document.getElementById("predictionResult").style.display = "none"; }

        function predictRiskyFoods() {
            if(myAllergies.length < 1) { alert("최소 1개 이상의 알레르기 음식을 추가해주세요."); return; }
            let riskData = {}; let suspectedProteinsHTML = ""; 
            myAllergies.forEach(food => {
                foodDatabase[food].proteins.forEach(protein => {
                    let riskClass = protein.risk === "high" ? "risk-high" : (protein.risk === "medium" ? "risk-medium" : "risk-low");
                    let heatIcon = protein.heatSafe ? "🔥안전" : "🔥위험";
                    suspectedProteinsHTML += `<span class="tag tag-small ${riskClass}" onclick="openProteinModal('${protein.name}')" title="클릭하여 패밀리 그룹 확인">[${food}] ${protein.name} (${heatIcon})</span>`;
                    
                    let baseScore = protein.risk === "high" ? 3 : (protein.risk === "medium" ? 2 : 1);
                    protein.relatedFoods.forEach(relatedFood => {
                        if(!myAllergies.includes(relatedFood)) { 
                            if(!riskData[relatedFood]) riskData[relatedFood] = { score: 0, causes: [] }; 
                            riskData[relatedFood].score += baseScore; 
                            riskData[relatedFood].causes.push(`<strong>${food}</strong>의 <span class="${riskClass}" style="padding: 2px 6px; border-radius: 5px; color: white; cursor: pointer;" onclick="openProteinModal('${protein.name}')">${protein.name}</span>`);
                        }
                    });
                });
            });
            document.getElementById("suspectedProteinsList").innerHTML = suspectedProteinsHTML;
            let sortedRiskyFoods = Object.keys(riskData).map(food => { return { name: food, score: riskData[food].score, causes: riskData[food].causes }; }).sort((a, b) => b.score - a.score);
            const predictList = document.getElementById("predictList"); predictList.innerHTML = "";
            if(sortedRiskyFoods.length === 0) { predictList.innerHTML = "<p style='color:#666;'>현재 입력하신 음식들을 기반으로 한 교차 위험 음식 데이터가 없습니다.</p>"; } 
            else {
                sortedRiskyFoods.forEach(item => {
                    let riskLabel, labelColor;
                    if(item.score >= 4) { riskLabel = "고위험군"; labelColor = "#c62828"; } else if(item.score >= 2) { riskLabel = "주의 필요"; labelColor = "#f57f17"; } else { riskLabel = "의심"; labelColor = "#2e7d32"; }
                    let causesText = item.causes.join(", ");
                    predictList.innerHTML += `<div class="predict-item"><div class="predict-header"><span class="food-name">${item.name}</span><span class="tag" style="background-color: transparent; border: 2px solid ${labelColor}; color: ${labelColor}; cursor: default;">${riskLabel}</span></div><div class="cause-reason">🔗 <strong>연관 원인:</strong> 회원님이 반응하시는 ${causesText} 단백질과 교차 반응을 일으킬 가능성이 있습니다.</div></div>`;
                });
            }
            document.getElementById("predictionResult").style.display = "block";
        }

        function setupAutocomplete(inputId, listId, actionFunc) {
            const input = document.getElementById(inputId); const list = document.getElementById(listId);
            input.addEventListener("input", function() {
                let val = this.value.trim(); list.innerHTML = ""; list.style.display = "none";
                if (!val) return false; let hasMatch = false;
                Object.keys(foodDatabase).forEach(food => {
                    if (food.includes(val)) {
                        hasMatch = true; let item = document.createElement("div");
                        item.innerHTML = food.replace(new RegExp(val, "gi"), "<strong>$&</strong>");
                        item.addEventListener("click", function() { input.value = food; list.innerHTML = ""; list.style.display = "none"; actionFunc(food); });
                        list.appendChild(item);
                    }
                });
                if (hasMatch) list.style.display = "block";
            });
            document.addEventListener("click", e => { if (e.target !== input) { list.innerHTML = ""; list.style.display = "none"; }});
        }
        setupAutocomplete("searchInput", "search-autocomplete", searchFood);
        setupAutocomplete("multiInput", "multi-autocomplete", addMyAllergy);
    </script>

</body>
</html>
